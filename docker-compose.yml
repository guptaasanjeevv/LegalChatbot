services:
  streamlit:
    build: .
    container_name: legal-chatbot-app
    ports:
      - "8501:8501"
    depends_on:
      - ollama
    volumes:
      - ./pdfs:/app/pdfs
    environment:
      - OLLAMA_URL=http://ollama:11434

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11435:11435"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: